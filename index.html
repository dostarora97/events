<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bengaluru events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0&icon_names=location_on,schedule" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #f0e8dc; }
    #bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

    /* Layout tokens — text column is roughly max-w-xl (576px = 36rem) */
    :root {
      --col-width: 36rem;         /* text column max-width */
      --fade-buffer: 5rem;        /* buffer inside the column edge before fade begins */

      /* Vertical white-wash gradient — a translucent white overlay that lets the
         animated background bleed through. Three control points, interpolated
         top→bottom:
           --wash-head-top  : alpha at the TOP of the header band
           --wash-mid       : SHARED seam — header band's bottom = selected card's top
           --wash-card-bot  : alpha at the BOTTOM of an expanded/highlighted card
         Header band always uses head-top→mid; a selected card uses mid→card-bot,
         so a band stacked above its open card forms one continuous wash. */
      --wash-head-top: 0.72;
      --wash-mid:      0.42;
      --wash-card-bot: 0.00;
    }
    @media (max-width: 640px) {
      :root {
        --col-width: 65vw;
        --fade-buffer: 4vw;
      }
    }

    /* Fade mask (horizontal) — reused by divider line and hover wash.
       Solid across the text column plus buffer; fades outward to viewport edges. */
    .fade-mask {
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
    }

    /* Edge-fading horizontal divider — only between adjacent rows */
    .fade-divider { position: relative; }
    .event-row + .event-row .fade-divider::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: rgba(160,148,132,0.55);
      pointer-events: none;
      z-index: 2;
      /* Fade mask (see .fade-mask above) — repeated because pseudo-elements can't inherit classes */
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
    }

    /* Row hover / expanded — same fade mask, solid across text column,
       fades outward to viewport edges. */
    .event-row .fade-divider::after {
      content: '';
      position: absolute;
      inset: 0;
      /* Resting state: same gradient shape at zero alpha so the transition to the
         washed state animates smoothly (color→gradient transitions would snap). */
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0)
      );
      pointer-events: none;
      transition: background 300ms ease;
      z-index: 0;
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0,
        black calc(50% - var(--col-width) / 2 - var(--fade-buffer)),
        black calc(50% + var(--col-width) / 2 + var(--fade-buffer)),
        transparent 100%
      );
    }
    .event-row .fade-divider:hover::after,
    .event-row .fade-divider:focus-visible::after,
    .event-row .fade-divider.is-open::after {
      /* Vertical white-wash: seam value at top → card-bottom value at bottom.
         The header band above meets this at --wash-mid, so wash is continuous. */
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, var(--wash-mid)),
        rgba(255, 255, 255, var(--wash-card-bot))
      );
    }
    .event-row .fade-divider:focus-visible {
      outline: none;  /* the wash acts as the focus indicator */
    }
    /* On touch devices :hover sticks after tap; keep the wash off unless expanded */
    @media (hover: none), (pointer: coarse) {
      .event-row .fade-divider:hover:not(.is-open)::after {
        background: rgba(255, 255, 255, 0);
      }
    }
    /* Row content sits above the wash */
    .event-row .fade-divider > * { position: relative; z-index: 1; }

    /* Accordion: smooth height + fade via grid-template-rows */
    .accordion {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      margin-top: 0;
      transition: grid-template-rows 400ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity          280ms ease,
                  margin-top       400ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .accordion.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-top: 0.75rem;
    }
    .accordion > .accordion-inner {
      overflow: hidden;
      min-height: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: 'opsz' 20, 'wght' 300, 'FILL' 0, 'GRAD' 0;
      vertical-align: -3px; font-size: 13px;
    }

    /* ── Debug control bar (hidden unless ?debug=true) ────────────────── */
    #mode-switch {
      display: none;
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
      align-items: center; gap: 10px;
      background: rgba(252,249,244,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(180,165,148,0.30);
      border-radius: 16px;
      padding: 8px 14px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      flex-wrap: wrap;
      justify-content: center;
      row-gap: 4px;
    }
    #mode-switch.visible { display: flex; }

    /* Collapse/expand affordance. When collapsed, the whole bar shrinks to a
       small gear pill anchored top-right; all controls hide. */
    #mode-switch .dbg-collapse {
      margin-left: auto;                 /* push to far right when expanded */
      flex: 0 0 auto;
      width: 22px; height: 22px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; border: 1px solid rgba(180,165,148,0.35);
      background: rgba(255,255,255,0.5); color: #7a6e63;
      cursor: pointer; font-size: 12px; line-height: 1;
    }
    #mode-switch .dbg-collapse:hover { background: rgba(255,255,255,0.85); color: #4a4238; }
    #mode-switch.collapsed {
      left: auto; right: 12px;           /* anchor to top-right, shed full width */
      width: auto; padding: 5px;
      gap: 0; justify-content: center;
      border-radius: 999px;
    }
    /* Hide every control while collapsed, except the toggle button */
    #mode-switch.collapsed > :not(.dbg-collapse) { display: none; }
    #mode-switch.collapsed .dbg-collapse { margin-left: 0; width: 26px; height: 26px; font-size: 13px; }

    #mode-switch .sep-v { width: 1px; height: 18px; background: rgba(180,165,148,0.35); }
    #mode-switch button {
      padding: 5px 12px; border-radius: 999px; border: none;
      background: transparent; color: #7a6e63;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      font-family: inherit; letter-spacing: 0.01em;
    }
    #mode-switch button:hover { color: #4a4238; background: rgba(180,165,148,0.15); }
    #mode-switch button[aria-pressed="true"] {
      background: rgba(180,165,148,0.35); color: #3a3228; font-weight: 600;
    }
    #mode-switch .slider-group {
      display: flex; align-items: center; gap: 6px;
      padding: 0 4px;
    }
    #mode-switch .slider-group label { color: #7a6e63; font-size: 10.5px; user-select: none; }
    #mode-switch input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px; border-radius: 2px;
      background: rgba(180,165,148,0.30);
      accent-color: #b8a898;
      cursor: pointer;
    }
    #mode-switch input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px; border-radius: 50%;
      background: #7a6e63;
      cursor: pointer;
    }
    #mode-switch .val {
      color: #a89880; font-size: 10px; min-width: 26px;
      font-variant-numeric: tabular-nums; text-align: right;
    }
    #mode-switch .toggle {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
      padding: 0 4px; user-select: none; color: #7a6e63;
    }
    #mode-switch .toggle input {
      appearance: none; -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 3px;
      border: 1px solid rgba(180,165,148,0.5);
      background: rgba(255,255,255,0.4);
      cursor: pointer; position: relative;
      margin: 0;
    }
    #mode-switch .toggle input:checked { background: #7a6e63; border-color: #7a6e63; }
    #mode-switch .toggle input:checked::after {
      content: ''; position: absolute;
      left: 3px; top: 0.5px;
      width: 4px; height: 8px;
      border: solid #fcf9f4;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }
    /* Debug bar: mobile — one slider per row, controls wrap freely */
    @media (max-width: 640px) {
      #mode-switch { gap: 4px 8px; }
      #mode-switch .slider-group { padding: 0; gap: 10px; flex: 0 0 100%; }
      #mode-switch .slider-group label { flex: 0 0 60px; }
      #mode-switch input[type=range] { flex: 1; width: auto; min-width: 0; }
      #mode-switch .val { flex: 0 0 34px; }
      #mode-switch .sep-v { display: none; }
      #mode-switch .toggle { padding: 0; gap: 5px; flex: 0 0 auto; }
    }

    /* HDR text (opt-in via body class) — mirrors the sRGB stone tiers in P3 space */
    body.hdr-text .text-stone-800 { color: color(display-p3 0.16 0.14 0.13 / 1); } /* primary */
    body.hdr-text .text-stone-600 { color: color(display-p3 0.30 0.27 0.25 / 1); } /* secondary */
    body.hdr-text .text-stone-500 { color: color(display-p3 0.44 0.40 0.36 / 1); } /* tertiary */
    body.hdr-text .text-stone-400 { color: color(display-p3 0.60 0.55 0.51 / 1); } /* muted */

    /* ── Header-band + card sticky grid ──────────────────────────────────
       One CSS grid, 3 equal columns (City | Day | Time). Each event is two
       rows: a full-height header band (row 2i+1) + a full-width card (2i+2).
       City & Day are overlaid as run-spanning cells on their slot column; a
       position:sticky child pins each for its whole run (blank on repeat rows).
       Time rides each band per-event. The band has an explicit height so it
       can never collapse into the card. */
    :root { --hh: 3rem; }   /* header band height */
    .evt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;   /* equal thirds */
      align-items: stretch;
      max-width: 36rem;                       /* same width as the old max-w-xl text column */
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header band: full-width, own row, guaranteed height, sticky (per-event
       bands replace one another at the top). 3-column inner grid for the slots. */
    .hband {
      grid-column: 1 / -1;
      position: sticky; top: 0;
      height: var(--hh);
      z-index: 8;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      /* Vertical white-wash: head-top alpha at the top → shared seam (--wash-mid)
         at the bottom, so the band meets the card wash below it seamlessly. */
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, var(--wash-head-top)),
        rgba(255, 255, 255, var(--wash-mid))
      );
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
    }
    .hband .h-slot {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
      color: #292524; white-space: nowrap; padding: 0 0.25rem;
    }
    .hband .h-left  { justify-self: start; }
    .hband .h-mid   { justify-self: center; }
    .hband .h-right { justify-self: end; }
    body.hdr-text .hband .h-slot { color: color(display-p3 0.16 0.14 0.13 / 1); }

    /* City / Day run rails: overlay cells spanning their run; sticky child pins. */
    .rail-cell { min-width: 0; z-index: 10; pointer-events: none; }
    .rail-label {
      position: sticky; top: 0;
      height: var(--hh);
      display: flex; align-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
      color: #292524; white-space: nowrap; padding: 0 0.25rem;
    }
    .rail-label.rail-mid   { justify-content: center; }
    .rail-label.rail-right { justify-content: flex-end; }
    body.hdr-text .rail-label { color: color(display-p3 0.16 0.14 0.13 / 1); }

    /* Description preview (collapsed row): show first line only, with a
       soft right-edge fade so the ellipsis feels intentional and invites
       tapping — the content itself signals "there's more". */
    .desc-preview {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
              mask-image: linear-gradient(to right, black 70%, transparent 100%);
    }
  </style>
  </style>
</head>
<body class="min-h-screen font-sans text-stone-600">

  <canvas id="bg"></canvas>

  <div id="mode-switch">
    <div class="slider-group" title="Speed — how fast gradients rotate">
      <label>speed</label>
      <input type="range" id="s-speed" min="0.1" max="10" step="0.1" value="4.0">
      <span class="val" id="v-speed">4.0</span>
    </div>
    <div class="slider-group" title="Warp — organic edge wobble">
      <label>warp</label>
      <input type="range" id="s-warp" min="0" max="4" step="0.1" value="1.5">
      <span class="val" id="v-warp">1.5</span>
    </div>
    <div class="slider-group" title="Scale — noise frequency">
      <label>scale</label>
      <input type="range" id="s-scale" min="0.3" max="3" step="0.05" value="2.0">
      <span class="val" id="v-scale">2.0</span>
    </div>
    <div class="slider-group" title="Colour intensity">
      <label>colour</label>
      <input type="range" id="s-intensity" min="0.05" max="0.9" step="0.01" value="0.50">
      <span class="val" id="v-intensity">0.50</span>
    </div>
    <div class="sep-v"></div>
    <div class="slider-group" title="Flow direction rotation — how much the whole flow field turns over time">
      <label>flow-rot</label>
      <input type="range" id="s-flowrot" min="0" max="2" step="0.05" value="1.0">
      <span class="val" id="v-flowrot">1.00</span>
    </div>
    <div class="slider-group" title="Per-colour intensity breathing — each colour waxes and wanes independently">
      <label>col-breath</label>
      <input type="range" id="s-colbreath" min="0" max="1" step="0.02" value="1.0">
      <span class="val" id="v-colbreath">1.00</span>
    </div>
    <div class="sep-v"></div>
    <div class="slider-group" title="White-wash — alpha at the TOP of the header band">
      <label>head top</label>
      <input type="range" id="s-washtop" min="0" max="1" step="0.02" value="0.72">
      <span class="val" id="v-washtop">0.72</span>
    </div>
    <div class="slider-group" title="White-wash — shared seam: header band bottom = selected card top">
      <label>seam</label>
      <input type="range" id="s-washmid" min="0" max="1" step="0.02" value="0.42">
      <span class="val" id="v-washmid">0.42</span>
    </div>
    <div class="slider-group" title="White-wash — alpha at the BOTTOM of an expanded/highlighted card">
      <label>card bot</label>
      <input type="range" id="s-washbot" min="0" max="1" step="0.02" value="0.00">
      <span class="val" id="v-washbot">0.00</span>
    </div>
    <div class="sep-v"></div>
    <label class="toggle" title="Use HDR (extended range) colours for the background">
      <input type="checkbox" id="t-hdrbg">
      <span>HDR bg</span>
    </label>
    <label class="toggle" title="Use HDR (display-p3) colours for the text">
      <input type="checkbox" id="t-hdrtext" checked>
      <span>HDR text</span>
    </label>
    <div class="sep-v"></div>
    <div class="slider-group" title="Header preset — display slots (left·mid·right)">
      <label>preset</label>
      <button type="button" class="preset-btn" data-preset="T_D">T·D</button>
      <button type="button" class="preset-btn" data-preset="D_T" aria-pressed="true">D·T</button>
      <button type="button" class="preset-btn" data-preset="CDT">C·D·T</button>
    </div>
    <div class="sep-v"></div>
    <button id="btn-reset" title="Reset to defaults">reset</button>
    <button type="button" id="dbg-collapse" class="dbg-collapse" title="Collapse / expand controls" aria-label="Collapse controls">⌃</button>
  </div>

  <main>

    <!-- Event list. Header + list repeat per day, all headers sticky. -->
    <div
      x-data="eventsApp()"
      x-init="load()"
    >
      <!-- Loading -->
      <p x-show="state === 'loading'" x-cloak
         class="text-sm text-stone-500 font-normal py-10 text-center">
        Loading events…
      </p>

      <!-- Error -->
      <p x-show="state === 'error'" x-cloak
         class="text-sm text-stone-600 font-normal py-10 text-center">
        <span x-text="error"></span>
      </p>

      <!-- Empty -->
      <p x-show="state === 'ready' && events.length === 0" x-cloak
         class="text-sm text-stone-500 font-normal py-10 text-center">
        No events.
      </p>

      <!-- Header-band + card sticky grid. Each event = a full-width header band
           (City|Day|Time on a 3-equal-column grid) + a full-width card below it.
           City/Day are overlaid as run-spanning sticky rails on their slot columns
           so they pin across their whole run (blank on repeated bands). Time rides
           each band per-event. openKey hoisted for one-open-at-a-time. -->
      <template x-if="state === 'ready' && events.length > 0">
        <div class="evt-grid" x-data="{ openKey: null }">

          <!-- Per-event: full-width header band + full-width card -->
          <template x-for="(row, i) in gridModel.rows" :key="row.ev.url || row.ev.title">
            <div class="contents" x-data="{ ev: row.ev, perRowCol: row.perRowCol, perRowLabel: row.perRowLabel }">
              <!-- Header band (row 2i+1): 3-equal-column. Only the per-event
                   field (time) is filled here; city/day come from the sticky rails. -->
              <div class="hband" :style="`grid-row: ${2 * i + 1}`">
                <span class="h-slot h-left"  x-text="perRowCol === 1 ? perRowLabel : ''"></span>
                <span class="h-slot h-mid"   x-text="perRowCol === 2 ? perRowLabel : ''"></span>
                <span class="h-slot h-right" x-text="perRowCol === 3 ? perRowLabel : ''"></span>
              </div>

              <!-- Card (row 2i+2): full width -->
              <div class="event-row" :style="`grid-column: 1 / -1; grid-row: ${2 * i + 2}`">
                <div class="fade-divider cursor-pointer group"
                     :class="{ 'is-open': openKey === ev.url }"
                     @click="openKey = (openKey === ev.url ? null : ev.url)"
                     @keydown.enter.prevent="openKey = (openKey === ev.url ? null : ev.url)"
                     @keydown.space.prevent="openKey = (openKey === ev.url ? null : ev.url)"
                     role="button" tabindex="0" :aria-expanded="openKey === ev.url ? 'true' : 'false'">
                  <div class="row-inner py-5">
                    <div class="flex items-baseline gap-3">
                      <span class="flex-shrink-0 w-6 text-base text-center" x-text="ev.emoji || ''"></span>
                      <span class="font-sans text-base font-semibold text-stone-800 leading-snug tracking-tight flex-1" x-text="ev.title || 'Untitled'"></span>
                    </div>
                    <p x-show="ev.location" class="mt-2 pl-9 text-xs text-stone-600 font-normal tracking-normal flex items-center flex-wrap gap-x-2.5 gap-y-1">
                      <span class="flex items-center gap-1"><span class="material-symbols-outlined text-stone-500">location_on</span><span x-text="ev.location"></span></span>
                    </p>
                    <p x-show="ev.description && openKey !== ev.url" class="desc-preview mt-2 pl-9 text-sm text-stone-600 font-normal leading-snug" x-text="ev.description"></p>
                    <div class="accordion pl-9" :class="{ 'open': openKey === ev.url && (ev.description || ev.url) }">
                      <div class="accordion-inner">
                        <p x-show="ev.description" class="text-sm text-stone-600 font-normal leading-relaxed" x-text="ev.description"></p>
                        <a x-show="ev.url" :href="ev.url" target="_blank" rel="noopener" @click.stop class="inline-block mt-2 text-xs text-stone-800 hover:text-stone-800 underline underline-offset-4 decoration-stone-400 hover:decoration-stone-600 transition-colors duration-150">More info →</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- City / Day sticky rails: one overlay cell per run, spanning its rows,
               pinned via sticky child. Placed on the field's slot column. -->
          <template x-for="rail in gridModel.rails" :key="rail.col">
            <template x-for="run in rail.runs" :key="rail.col + ':' + run.rowStart">
              <div class="rail-cell"
                   :style="`grid-column: ${rail.col}; grid-row: ${run.rowStart} / span ${run.span}`">
                <div class="rail-label" :class="{ 'rail-mid': rail.col === 2, 'rail-right': rail.col === 3 }" x-text="run.label"></div>
              </div>
            </template>
          </template>
        </div>
      </template>
    </div>

  </main>

  <script>
    // Configurable data source — change this to point to any API returning a JSON array of events.
    // Each event object may include: emoji, title, time, location, description, url.
    // All fields are optional except title (or the row will render as "Untitled").
    window.EVENTS_URL = 'events.json';

    function eventsApp() {
      return {
        state: 'loading',   // 'loading' | 'ready' | 'error'
        events: [],
        error: '',
        async load() {
          try {
            const res = await fetch(window.EVENTS_URL, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error('Response is not an array');
            this.events = data;
            this.state  = 'ready';
            // Keep the browser tab title in sync with the derived date range
            document.title = `${this.dateLabel} · Bangalore`;
          } catch (e) {
            this.error = `Couldn't load events: ${e.message}`;
            this.state = 'error';
            console.error(e);
          }
        },

        // ── Date/time helpers, shared by dateLabel + groups ──────────────
        // All derived from the data so nothing is ever hardcoded.
        _MONTHS: ['January','February','March','April','May','June','July',
                  'August','September','October','November','December'],
        _MONTHS_SHORT: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        _WEEKDAY_SHORT: {
          sunday:'Sun', monday:'Mon', tuesday:'Tue', wednesday:'Wed',
          thursday:'Thu', friday:'Fri', saturday:'Sat',
        },

        // Parse "10th July, Friday, 11:00 AM" → {day, monthIdx, weekday} (or null)
        _parseDate(datetime) {
          const s = datetime || '';
          const dm = s.match(/(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z]+)/);
          if (!dm) return null;
          const day = parseInt(dm[1], 10);
          const monthIdx = this._MONTHS.findIndex(m => m.toLowerCase() === dm[2].toLowerCase());
          if (monthIdx === -1) return null;
          const wm = s.match(/\b(Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday)\b/i);
          const weekday = wm ? this._WEEKDAY_SHORT[wm[1].toLowerCase()] : '';
          return { day, monthIdx, weekday };
        },

        // Parse "11:00 AM" → minutes since midnight (missing time sorts last)
        _parseMinutes(time) {
          const m = (time || '').match(/(\d{1,2}):(\d{2})\s*([AP]M)/i);
          if (!m) return 24 * 60 + 1;
          let h = parseInt(m[1], 10) % 12;
          if (/pm/i.test(m[3])) h += 12;
          return h * 60 + parseInt(m[2], 10);
        },

        // ── Field registry ───────────────────────────────────────────────
        // Each field is defined once: keyOf (bucket key), labelOf (display),
        // cmp (comparator). Presets are ordered field pairs; the generic
        // comparator sorts by them in order (like SQL ORDER BY f0, f1).
        _FIELDS: {
          day: {
            keyOf:   function (e, self) { const d = self._parseDate(e.datetime); return d ? d.monthIdx * 100 + d.day : -1; },
            labelOf: function (e, self) {
              const d = self._parseDate(e.datetime);
              if (!d) return '';
              const wd = d.weekday ? d.weekday + ' ' : '';
              return `${wd}${d.day} ${self._MONTHS_SHORT[d.monthIdx]}`;
            },
            cmp: function (a, b, self) { return self._FIELDS.day.keyOf(a, self) - self._FIELDS.day.keyOf(b, self); },
          },
          time: {
            keyOf:   function (e) { return (e.time || '').trim() || '—'; },
            labelOf: function (e) { return (e.time || '').trim() || '—'; },
            cmp:     function (a, b, self) { return self._parseMinutes(a.time) - self._parseMinutes(b.time); },
          },
          city: {   // defined for future presets (e.g. C:D); not referenced by the two active ones
            keyOf:   function (e) { return (e.city || '').trim() || 'Other'; },
            labelOf: function (e) { return (e.city || '').trim() || 'Other'; },
            cmp:     function (a, b) { return ((a.city || '').trim()).localeCompare((b.city || '').trim()); },
          },
        },
        // Presets: each has display `slots` [left, mid, right] (field name or null)
        // and its own `sort` field list (independent of display). Reuses _FIELDS
        // + the generic _comparator. Array (ordered) so the debug panel can iterate.
        _PRESETS: [
          { id: 'T_D', label: 'T·D',   slots: ['time', null,  'day'],  sort: ['day', 'time'] },
          { id: 'D_T', label: 'D·T',   slots: ['day',  null,  'time'], sort: ['day', 'time'] },
          { id: 'CDT', label: 'C·D·T', slots: ['city', 'day', 'time'], sort: ['city', 'day', 'time'] },
        ],
        preset: 'D_T',   // active preset id; default D·T (day left, time right, mid empty)
        _activePreset() { return this._PRESETS.find(p => p.id === this.preset) || this._PRESETS[0]; },

        // Generic comparator built on the fly from an ordered list of field names.
        _comparator(fieldNames) {
          return (a, b) => {
            for (const f of fieldNames) {
              const r = this._FIELDS[f].cmp(a, b, this);
              if (r !== 0) return r;
            }
            return 0;
          };
        },

        // Which slot index (0=left,1=mid,2=right) a field occupies in the active preset.
        _slotFor(field) { return this._activePreset().slots.indexOf(field); },

        // ── Grid model for the header-band + card sticky layout ─────────────
        // Each event = two grid rows: a full-width header band (row 2i+1) holding
        // the City|Day|Time slots, and a full-width card (row 2i+2). City & Day
        // are overlaid as run-spanning sticky rails on their slot columns so they
        // pin across their whole run (blank on repeated rows). Time rides each
        // header band per-event. All three slots align to a 3-equal-column grid,
        // each field placed in its preset slot column (left=1, mid=2, right=3).
        //
        // Shape:
        //   { rows: [{ ev, slots:[l,m,r] }],   // slots = label per column for THIS event's band
        //     rails:[{ col, runs:[{rowStart, span, label}] }],  // pinning fields (city/day)
        //     perRowCols: [colIndex,…] }        // columns whose value is per-event (time)
        get gridModel() {
          const preset = this._activePreset();
          const shownSort = preset.sort.filter(f => this._slotFor(f) >= 0);   // shown ∩ sort order
          const sorted = [...this.events].sort(this._comparator(preset.sort));

          // Finest field (last in sort order) is per-event (e.g. time); the rest form rails.
          const perRowField = shownSort.length ? shownSort[shownSort.length - 1] : null;
          const railFields  = shownSort.slice(0, -1);

          // Rails: each pinning field, its slot column (1-based), and its runs.
          // A run of `len` events spans 2*len grid rows from 2*firstIdx+1.
          const rails = railFields.map(field => {
            const col = this._slotFor(field) + 1;   // 1-based grid column
            const runs = [];
            let lastKey = Symbol(), cur = null;
            sorted.forEach((ev, i) => {
              const k = this._FIELDS[field].keyOf(ev, this);
              if (k !== lastKey) {
                lastKey = k;
                cur = { rowStart: 2 * i + 1, span: 0, label: this._FIELDS[field].labelOf(ev, this) };
                runs.push(cur);
              }
              cur.span++;
            });
            runs.forEach(r => { r.span *= 2; });   // each event = 2 grid rows
            return { field, col, runs };
          });

          // Per-event rows: each event's band shows only its per-row field(s) in
          // their slot columns (rail fields are blank here — the overlay shows them).
          const perRowCol = perRowField ? this._slotFor(perRowField) + 1 : 0;
          const rows = sorted.map(ev => ({
            ev,
            perRowCol,
            perRowLabel: perRowField ? this._FIELDS[perRowField].labelOf(ev, this) : '',
          }));

          return { rows, rails };
        },

        // Overall date range — used only for the browser tab <title>.
        //   single day -> "10 Jul", same month -> "10–12 Jul", else "30 Jul – 2 Aug"
        get dateLabel() {
          const parsed = this.events
            .map(e => this._parseDate(e.datetime))
            .filter(Boolean)
            .sort((a, b) => a.monthIdx - b.monthIdx || a.day - b.day);
          if (parsed.length === 0) return 'Bengaluru events';
          const first = parsed[0], last = parsed[parsed.length - 1];
          const S = this._MONTHS_SHORT;
          if (first.day === last.day && first.monthIdx === last.monthIdx) {
            return `${first.day} ${S[first.monthIdx]}`;
          }
          if (first.monthIdx === last.monthIdx) {
            return `${first.day}–${last.day} ${S[first.monthIdx]}`;
          }
          return `${first.day} ${S[first.monthIdx]} – ${last.day} ${S[last.monthIdx]}`;
        },
      };
    }
  </script>

  <script type="module">
    // Background rendering runs entirely off the main thread in a Web Worker
    // that owns an OffscreenCanvas. This script only ships control messages
    // (resize, slider values, tab visibility) to the worker — it never touches
    // WebGL, three.js, or the render loop directly. Result: scrolling, input,
    // and DOM interaction stay smooth regardless of shader load.

    // Debug controls — only show the top panel when ?debug=true is set
    const DEBUG = new URLSearchParams(location.search).get('debug') === 'true';
    if (DEBUG) document.getElementById('mode-switch').classList.add('visible');

    // Collapse / expand the debug bar. Collapsed → shrinks to a small gear pill
    // top-right; the toggle glyph flips between chevron (collapse) and gear (expand).
    (function wireDebugCollapse() {
      const bar = document.getElementById('mode-switch');
      const btn = document.getElementById('dbg-collapse');
      if (!bar || !btn) return;
      btn.addEventListener('click', () => {
        const collapsed = bar.classList.toggle('collapsed');
        btn.textContent = collapsed ? '⚙' : '⌃';
        btn.setAttribute('aria-label', collapsed ? 'Expand controls' : 'Collapse controls');
      });
    })();

    const canvas = document.getElementById('bg');

    // Half-res render + CSS upscale — same as before, but sized on the main
    // thread and communicated to the worker via 'resize' messages.
    const RENDER_SCALE = 0.5;

    function currentSize() {
      return {
        width:  Math.max(1, Math.floor(window.innerWidth  * RENDER_SCALE)),
        height: Math.max(1, Math.floor(window.innerHeight * RENDER_SCALE)),
      };
    }

    // Apply CSS size (upscaled to viewport) on the main thread.
    function applyCssSize() {
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      canvas.style.imageRendering = 'auto';
    }

    // Spin up worker + transfer the OffscreenCanvas.
    // The worker imports three.js as an ES module, so we use type: 'module'.
    const worker = new Worker('bg-worker.js', { type: 'module' });
    const offscreen = canvas.transferControlToOffscreen();
    const initSize = currentSize();
    applyCssSize();
    worker.postMessage(
      { type: 'init', canvas: offscreen, width: initSize.width, height: initSize.height },
      [offscreen]  // transfer, not copy
    );

    // ── Resize (debounced to avoid message spam during drag) ─────────────
    let resizeRaf = 0;
    window.addEventListener('resize', () => {
      if (resizeRaf) return;
      resizeRaf = requestAnimationFrame(() => {
        resizeRaf = 0;
        applyCssSize();
        const { width, height } = currentSize();
        worker.postMessage({ type: 'resize', width, height });
      });
    });

    // ── Visibility — pause worker render loop when tab hidden ────────────
    document.addEventListener('visibilitychange', () => {
      worker.postMessage({ type: 'visibility', visible: !document.hidden });
    });

    // ── Top control bar wiring ───────────────────────────────────────────
    // Each slider sends a single postMessage to the worker on input.
    const DEFAULTS = {
      speed: 4.0, warp: 1.5, scale: 2.0, intensity: 0.50,
      flowRot: 1.0, colBreath: 1.0,
    };

    function send(name, value) {
      worker.postMessage({ type: 'uniform', name, value });
    }

    function bindSlider(sid, vid, decimals, uniformName) {
      const s = document.getElementById(sid);
      const v = document.getElementById(vid);
      s.addEventListener('input', () => {
        const val = parseFloat(s.value);
        v.textContent = val.toFixed(decimals);
        send(uniformName, val);
      });
    }
    // Note: 'timeScale' is a special pseudo-uniform handled inside the worker.
    bindSlider('s-speed',     'v-speed',     1, 'timeScale');
    bindSlider('s-warp',      'v-warp',      1, 'uWarp');
    bindSlider('s-scale',     'v-scale',     2, 'uBlob');
    bindSlider('s-intensity', 'v-intensity', 2, 'uIntensity');
    bindSlider('s-flowrot',   'v-flowrot',   2, 'uFlowRot');
    bindSlider('s-colbreath', 'v-colbreath', 2, 'uColBreath');

    // White-wash sliders — pure CSS-var controls (no worker involvement).
    // Each writes a --wash-* custom property on :root; the header band and the
    // selected-card wash read them live.
    const WASH_DEFAULTS = { top: 0.72, mid: 0.42, bot: 0.00 };
    function bindWash(sid, vid, cssVar) {
      const s = document.getElementById(sid);
      const v = document.getElementById(vid);
      s.addEventListener('input', () => {
        const val = parseFloat(s.value);
        v.textContent = val.toFixed(2);
        document.documentElement.style.setProperty(cssVar, val);
      });
    }
    bindWash('s-washtop', 'v-washtop', '--wash-head-top');
    bindWash('s-washmid', 'v-washmid', '--wash-mid');
    bindWash('s-washbot', 'v-washbot', '--wash-card-bot');

    document.getElementById('btn-reset').addEventListener('click', () => {
      const set = (sid, vid, val, dec, uniformName) => {
        const s = document.getElementById(sid), v = document.getElementById(vid);
        s.value = val;
        v.textContent = Number(val).toFixed(dec);
        send(uniformName, val);
      };
      set('s-speed',     'v-speed',     DEFAULTS.speed,     1, 'timeScale');
      set('s-warp',      'v-warp',      DEFAULTS.warp,      1, 'uWarp');
      set('s-scale',     'v-scale',     DEFAULTS.scale,     2, 'uBlob');
      set('s-intensity', 'v-intensity', DEFAULTS.intensity, 2, 'uIntensity');
      set('s-flowrot',   'v-flowrot',   DEFAULTS.flowRot,   2, 'uFlowRot');
      set('s-colbreath', 'v-colbreath', DEFAULTS.colBreath, 2, 'uColBreath');
      // Reset white-wash sliders + their CSS vars
      const setWash = (sid, vid, val, cssVar) => {
        const s = document.getElementById(sid), v = document.getElementById(vid);
        s.value = val;
        v.textContent = Number(val).toFixed(2);
        document.documentElement.style.setProperty(cssVar, val);
      };
      setWash('s-washtop', 'v-washtop', WASH_DEFAULTS.top, '--wash-head-top');
      setWash('s-washmid', 'v-washmid', WASH_DEFAULTS.mid, '--wash-mid');
      setWash('s-washbot', 'v-washbot', WASH_DEFAULTS.bot, '--wash-card-bot');
      // Reset toggles too (HDR text ON by default, HDR bg OFF)
      document.getElementById('t-hdrbg').checked = false;
      document.getElementById('t-hdrtext').checked = true;
      document.body.classList.add('hdr-text');
      send('uHDR', 0);
    });

    // HDR toggles
    document.getElementById('t-hdrbg').addEventListener('change', (e) => {
      send('uHDR', e.target.checked ? 1 : 0);
    });
    document.getElementById('t-hdrtext').addEventListener('change', (e) => {
      document.body.classList.toggle('hdr-text', e.target.checked);
    });

    // Apply HDR text on load (checkbox is `checked` by default in HTML)
    if (document.getElementById('t-hdrtext').checked) {
      document.body.classList.add('hdr-text');
    }

    // Preset selector (debug panel) — sets the Alpine `preset` id on the eventsApp
    // component. Generalised to N buttons via each button's data-preset.
    (function wirePreset() {
      const appEl = document.querySelector('[x-data="eventsApp()"]');
      const btns = [...document.querySelectorAll('.preset-btn')];
      if (!appEl || !btns.length) return;
      const setPreset = (id) => {
        const data = window.Alpine && Alpine.$data(appEl);
        if (data) data.preset = id;
        btns.forEach(b => b.setAttribute('aria-pressed', String(b.dataset.preset === id)));
      };
      btns.forEach(b => b.addEventListener('click', () => setPreset(b.dataset.preset)));
    })();
  </script>
